name: mobile_sslogistics
description: "SS Logistics mobile app — Flutter client for the SSLogistics platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP + cookie-based session
  dio: ^5.8.0+1
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # Secure local storage (session persistence)
  flutter_secure_storage: ^9.2.4

  # Date/number formatting
  intl: ^0.20.2

  # Cookie jar storage path resolution
  path_provider: ^2.1.0
  file_picker: ^11.0.2
  open_filex: ^4.7.0
  file_saver: ^0.4.0

  # Push notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Crash / error reporting
  sentry_flutter: ^9.23.0
  sentry_dio: ^9.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/s-logo-app-icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/s-logo-adaptive-foreground.png"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/images/s-logo-native-splash.png"
  android_12:
    color: "#0F172A"
    image: "assets/images/s-logo-native-splash.png"

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
